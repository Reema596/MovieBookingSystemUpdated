apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: movie-booking-cluster
  region: ap-south-1
  version: "1.29"

managedNodeGroups:
  - name: movie-booking-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 2
    volumeSize: 20

cloudWatch:
  clusterLogging:
    enableTypes: ["*"]
