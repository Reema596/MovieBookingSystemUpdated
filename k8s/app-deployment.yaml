apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-booking-app
  namespace: movie-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-booking-app
  template:
    metadata:
      labels:
        app: movie-booking-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: movie-booking-app
          image: ghcr.io/Reema596/movie-booking-application:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: movie-booking-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: movie-booking-app
  namespace: movie-booking
spec:
  selector:
    app: movie-booking-app
  ports:
    - name: http
      port: 80
      targetPort: 8081
  type: LoadBalancer
